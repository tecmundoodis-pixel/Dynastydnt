<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynasty DNT</title>
<style>
body {
  margin: 0;
  background: #0d0d0d;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

.hero {
  padding: 100px 20px;
}

button {
  background: #ff4d00;
  border: none;
  padding: 15px 30px;
  color: white;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
}

.products {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  padding: 40px;
}

.card {
  background: #1c1c1c;
  padding: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>DYNASTY DNT</h1>
  <p>Não seguimos tendências. Criamos movimentos.</p>
  <button>ENTRAR NA ERA</button>
</div>

<div class="products">
  <div class="card">
    <h2>Oversized Dynasty Core</h2>
    <p>R$ 149,90</p>
  </div>

  <div class="card">
    <h2>Mancham Dynasty Washed</h2>
    <p>R$ 120,00</p>
  </div>

  <div class="card">
    <h2>Cropped Dynasty Basic</h2>
    <p>R$ 90,00</p>
  </div>

  <div class="card">
    <h2>Regatinha Dynasty Essential</h2>
    <p>R$ 70,00</p>
  </div>
</div>

</body>
</html>
